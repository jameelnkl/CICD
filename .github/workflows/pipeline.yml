name: CI (dev → PR)

on:
  push:
    branches: [ "dev" ]   # run only when you push to dev

permissions:
  contents: write
  pull-requests: write

jobs:
  unit-test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps (if any)
        run: python -m pip install --upgrade pip
        # add: pip install -r requirements.txt  (if you have one)

      - name: Run unit tests
        run: python -m unittest -v

  create-pull-request:
    needs: unit-test-job
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - name: Open PR dev → main if not exists
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = "dev";
            const base = "main";
            const title = "Auto merge dev to main";
            const body = "Opened automatically after successful tests on `dev`.";
            const prs = await github.rest.pulls.list({ owner, repo, state: "open", base, head: `${owner}:${head}` });
            if (prs.data.length) {
              core.info(`PR already open: #${prs.data[0].number}`);
            } else {
              const pr = await github.rest.pulls.create({ owner, repo, head, base, title, body });
              core.info(`Opened PR #${pr.data.number}`);
            }
