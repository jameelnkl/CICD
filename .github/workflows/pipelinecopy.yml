name: Dev Pipeline

on:
  push:
    branches:
      - dev
      - main   # allow Docker jobs to run on merges to main

permissions:
  contents: read
  pull-requests: write
  packages: write   # needed to push images to GHCR

env:
  API_TOKEN: ${{ secrets.API_TOKEN }}

jobs:
  unit-test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt || true

      - name: Run unit tests
        run: python3 -m unittest

  create-pull-request:
    runs-on: ubuntu-latest
    needs: unit-test-job
    if: github.ref == 'refs/heads/dev'
    steps:
      - name: Create pull request
        run: |
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" -X POST \
            -H "Authorization: token $API_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "{\"title\": \"Auto merge dev to main\", \"head\": \"dev\", \"base\": \"main\"}")
          echo "HTTP status code: $RESPONSE"
          cat response.json

  build-docker-image:
    runs-on: ubuntu-latest
    needs: unit-test-job         # only run if unit tests succeed
    if: github.ref == 'refs/heads/main'   # only on pushes/merges to main
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t myapp:latest .

      - name: Run tests inside container
        run: |
          docker run --rm myapp:latest python -m unittest

  push-docker-image:
    runs-on: ubuntu-latest
    needs: build-docker-image    # only run if build succeeded
    if: github.ref == 'refs/heads/main'   # only on main
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR (:latest)
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/myapp
          docker tag myapp:latest $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest
